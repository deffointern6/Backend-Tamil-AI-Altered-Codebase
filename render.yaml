services:
  - type: web
    name: tamil-ai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tamil-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tamil-ai-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false

  - type: worker
    name: tamil-ai-worker-default
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker -u $REDIS_URL default --max-jobs 100
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tamil-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tamil-ai-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false

  - type: worker
    name: tamil-ai-worker-high
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker -u $REDIS_URL high --max-jobs 100
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tamil-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tamil-ai-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false

databases:
  - name: tamil-ai-db
    plan: free

redis:
  - name: tamil-ai-redis
    plan: free
    ipAllowList: [] # Only allow internal connections from services
