version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tamil_ai_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    network_mode: host
    volumes:
      - redis_data:/data
    mem_limit: 512m
    memswap_limit: 512m
    restart: always

  api:
    build: .
    container_name: tamil_ai_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    network_mode: host
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      - redis
    mem_limit: 2g
    memswap_limit: 2g
    restart: always

  high-worker:
    build: .
    command: rq worker high --max-jobs 100
    network_mode: host
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-1:
    build: .
    command: rq worker default --max-jobs 100
    network_mode: host
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-2:
    build: .
    command: rq worker default --max-jobs 100
    network_mode: host
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-3:
    build: .
    command: rq worker default --max-jobs 100
    network_mode: host
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  # --- Local Model Space Servers ---
  model-letter-gen:
    build: .
    container_name: tamil_ai_model_letter_gen
    working_dir: /app/local_spaces/letter-gen
    command: python app.py
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=7860
      - GRADIO_SERVER_PORT=7860
      - GRADIO_SERVER_NAME=127.0.0.1
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
    volumes:
      - ./local_spaces:/app/local_spaces
      - /root/.cache:/root/.cache
    mem_limit: 1.5g
    memswap_limit: 2g
    restart: always

  model-paraphrase-gen:
    build: .
    container_name: tamil_ai_model_paraphrase_gen
    working_dir: /app/local_spaces/paraphrase-gen
