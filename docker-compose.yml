version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tamil_ai_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 512m
    memswap_limit: 512m
    restart: always

  api:
    build: .
    container_name: tamil_ai_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    mem_limit: 2g
    memswap_limit: 2g
    restart: always

  high-worker:
    build: .
    command: rq worker high --max-jobs 100
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-1:
    build: .
    command: rq worker default --max-jobs 100
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-2:
    build: .
    command: rq worker default --max-jobs 100
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

  default-worker-3:
    build: .
    command: rq worker default --max-jobs 100
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    mem_limit: 1g
    memswap_limit: 1g
    restart: always

volumes:
  redis_data:

